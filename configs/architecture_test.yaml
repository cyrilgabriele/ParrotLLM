# Architecture test config — fast feedback loop for validating architecture changes.
# Use this config after each change: train → eval → inference.
# 500 steps on experiment-a data (~2-5 min per run).

model:
  vocab_size: 50258
  pad_token_id: 50257
  bos_token_id: 50256
  eos_token_id: 50256
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 342          # 8/3 * 128, SwiGLU-ready intermediate size
  context_length: 1024 # RoPE supports arbitrary lengths
  bias: false
  dropout: 0.0
  rope_theta: 10000.0

training:
  device: auto
  train_bin: data/experiment-a/train.bin
  val_bin: data/experiment-a/val.bin
  batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-3
  min_lr: 1.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 50
  max_steps: 500
  lr_schedule: wsd      # Warmup-Stable-Decay
  lr_decay_ratio: 0.1   # last 50 steps for decay
  z_loss_coeff: 1.0e-4
  save_every: 250
  eval_every: 100
  checkpoint_dir: checkpoints/architecture-test
  runs_dir: runs
  log_every: 25

eval:
  device: auto
  batch_size: 8
  max_sequences: 20
  datasets:
    - name: "wikitext103-test"
      subset: "wikitext-103-raw-v1"
      split: "test"
      path: "data/wikitext-103-test/test.bin"

inference:
  device: auto
  max_tokens: 50
  temperature: 0.8
  top_k: 40
  top_p: 0.95

logging:
  console_level: INFO
  file_level: DEBUG
  components:
    training: DEBUG
