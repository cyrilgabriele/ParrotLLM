# ParrotLLM — single source of truth for all hyperparameters
# ──────────────────────────────────────────────────────────

preprocess:
  dataset_size: full
  lang: en
  data_dir: data
  num_workers: auto
  skip_dedup: false
  skip_decontam: false
  filter_mode: heuristic
  skip_code_filter: false
  skip_quality_filter: false
  skip_ellipsis_filter: false
  append_eos_token: false
  token_dtype: uint16
  min_tokens: 64
  context_length: 1024
  target_tokens: null
  topic_classes: null
  topic_distribution: null
  skip_topic_filter: false

model:
  vocab_size: 50258          # GPT-2 tokenizer vocabulary (+ pad token)
  pad_token_id: 50257        # dedicated <|pad|>
  bos_token_id: 50256        # GPT-2 reuses eos as bos
  eos_token_id: 50256        # </s>
  d_model: 320               # hidden dimension
  n_layers: 16               # transformer blocks
  n_heads: 8                 # attention heads (d_head = d_model / n_heads = 40)
  d_ff: 854                  # SwiGLU FFN intermediate size
  context_length: 1024       # max sequence length
  bias: false                # no bias in linear layers
  dropout: 0.0151            # best tuned dropout
  rope_theta: 10000.0        # RoPE base frequency
  gradient_checkpointing: false  # enable only when activations do not fit

training:
  device: auto

  # data (output of --stage preprocess)
  train_bin: data/processed/train.bin
  val_bin: data/processed/val.bin
  num_workers: 4            # VL06 recommendation
  pin_memory: true

  # batching
  batch_size: 64             # per-GPU micro-batch from best tuning run
  gradient_accumulation_steps: 4  # effective batch = 64 * 4 * num_gpus

  # optimizer — AdamW
  learning_rate: 4.261e-4
  min_lr: 4.261e-5           # 10% of peak lr
  weight_decay: 0.0190
  beta1: 0.9
  beta2: 0.9332
  grad_clip: 1.9053

  # schedule
  warmup_steps: 150
  max_steps: 100000
  lr_schedule: wsd      # wsd = Warmup-Stable-Decay; cosine = cosine annealing
  lr_decay_ratio: 0.2296   # fraction of steps used for decay (WSD only)
  z_loss_coeff: 6.540e-4   # penalise large logits for mixed-precision stability

  # checkpointing
  save_every: 5000           # save checkpoint every N steps
  eval_every: 500            # evaluate every N steps
  checkpoint_dir: checkpoints

  # logging
  runs_dir: runs             # base directory for run outputs
  log_every: 10              # log to console every N steps

logging:
  console_level: INFO
  file_level: DEBUG
  # per-component log level overrides
  components:
    data_preprocessing: DEBUG
    model_initialization: INFO
    training: INFO
  profiler:
    enabled: false
    wait: 1
    warmup: 1
    active: 4
    repeat: 1
    activities:
      - cpu
      - cuda

eval:
  device: auto
  batch_size: 32
  max_sequences: 512         # cap eval sequences for speed
  datasets:
    - name: wikitext
      path: wikitext
      subset: wikitext-103-raw-v1
      split: test
    - name: owt_val
      path: data/processed/val.bin

inference:
  device: auto
  max_tokens: 128
  temperature: 0.2           # 0 = greedy
  top_k: 50
  top_p: 0.9

chat:
  device: auto
  max_tokens: 256
  temperature: 0.7
  top_k: 50
  top_p: 0.9
  system_prompt: "You are ParrotLLM, a helpful assistant."
  checkpoint_dir: checkpoints
