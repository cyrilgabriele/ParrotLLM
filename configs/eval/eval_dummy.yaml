# Smoke-test config for the eval stage (CPU-friendly settings)

model:
  vocab_size: 50258
  pad_token_id: 50257
  bos_token_id: 50256
  eos_token_id: 50256
  d_model: 320
  n_layers: 16
  n_heads: 8
  d_ff: 854
  context_length: 1024
  bias: false
  dropout: 0.0
  rope_theta: 10000.0

logging:
  console_level: INFO
  file_level: DEBUG

eval:
  device: cpu
  batch_size: 4
  max_sequences: 32
  datasets:
    - name: wikitext
      path: wikitext
      subset: wikitext-103-raw-v1
      split: test
    - name: owt_val
      path: data/processed/val.bin
