# Minimal GPU/DDP smoke-test configuration.
# Designed for torchrun with 2 local ranks to verify distributed plumbing.

model:
  vocab_size: 50258
  pad_token_id: 50257
  bos_token_id: 50256
  eos_token_id: 50256
  d_model: 128
  n_layers: 4
  n_heads: 4
  d_ff: 342
  context_length: 256
  bias: false
  dropout: 0.0
  rope_theta: 10000.0

training:
  # Use auto to pick CUDA on GPU hosts, or gracefully fall back to CPU/MPS locally.
  device: auto
  train_bin: data/processed/train.bin
  # Point validation to a non-existent file to skip evaluation during the smoke test.
  val_bin: data/processed/dummy_val.bin
  num_workers: 2
  pin_memory: true
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 4
  max_steps: 12
  lr_schedule: wsd
  lr_decay_ratio: 0.25
  z_loss_coeff: 1.0e-4
  save_every: 100
  eval_every: 100
  checkpoint_dir: checkpoints
  keep_last_checkpoints: 10
  keep_best_checkpoints: 10
  runs_dir: runs
  log_every: 1

logging:
  console_level: INFO
  file_level: DEBUG
  components:
    training: DEBUG
    model_initialization: INFO
  profiler:
    enabled: true
    
