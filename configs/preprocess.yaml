# Smoke-test config for the preprocess stage (skips heavy filters and uses the dummy dataset)
preprocess:
  dataset_size: dummy
  lang: en
  data_dir: data
  num_workers: auto
  skip_dedup: true
  skip_decontam: true
  filter_mode: none
  skip_code_filter: true
  skip_quality_filter: true
  skip_ellipsis_filter: true
  append_eos_token: false
  token_dtype: uint16
  min_tokens: 8
  context_length: 1024
  target_tokens: null
  topic_classes: null
  topic_distribution: null
  skip_topic_filter: true
  
  # Optional: override default tokenizer
  tokenizer_name: null
  
  # Optional: fine-tune batch processing (uses defaults if omitted)
  batch_size: 2048
  minimum_tokens_per_doc: 64
  validation_split_ratio: 0.01
  num_workers_multiplier: 2.0

logging:
  console_level: INFO
  file_level: DEBUG
