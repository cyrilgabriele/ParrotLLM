# Fast-learning sanity-check preprocess config.
# Purpose: build a tiny, easy subset that should show visible learning quickly.

preprocess:
  # target_tokens takes precedence over dataset_size in this codebase; keep
  # dataset_size as a fallback only.
  dataset_size: dummy
  target_tokens: 2000000

  lang: en
  data_dir: data
  num_workers: auto

  # Keep preprocessing light so iteration stays fast. This dataset is for
  # learning-signal sanity checks, not for final benchmark-quality training.
  skip_dedup: true
  skip_decontam: true
  filter_mode: heuristic
  skip_code_filter: false
  skip_quality_filter: false
  skip_ellipsis_filter: true

  # Narrow the domain so the model can latch onto patterns quickly.
  topic_classes:
    - Sci/Tech
  topic_distribution: null
  skip_topic_filter: false

  append_eos_token: false
  token_dtype: uint16
  min_tokens: 64
  context_length: 256

  tokenizer_name: openai-community/gpt2

  batch_size: 2048
  minimum_tokens_per_doc: 64
  validation_split_ratio: 0.05
  num_workers_multiplier: 2.0

logging:
  console_level: INFO
  file_level: DEBUG
