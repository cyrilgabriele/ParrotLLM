# Variant A: Baseline (no topic filter)
# Baseline with heuristic filtering but no topic filtering.
# Reference: DATASET_EXPERIMENT_PLAN.md

preprocess:
  dataset_size: dummy
  lang: en
  data_dir: data
  num_workers: auto
  skip_dedup: false
  skip_decontam: false
  filter_mode: heuristic
  skip_code_filter: false
  skip_quality_filter: false
  skip_ellipsis_filter: false
  append_eos_token: true
  token_dtype: uint16
  min_tokens: 8
  minimum_tokens_per_doc: 64
  context_length: 1024
  target_tokens: 300000000
  topic_classes: null
  topic_distribution: null
  skip_topic_filter: true
  # Optional: use default tokenizer
  tokenizer_name: null

logging:
  console_level: INFO
  file_level: DEBUG
