# Variant E: Knowledge-balanced (no Sports, no resampling)
# Keeps broad factual/technical prose while preserving the natural class mix
# of the sampled OpenWebText slice.

preprocess:
  dataset_size: dummy
  lang: en
  data_dir: data
  num_workers: auto
  skip_dedup: false
  skip_decontam: false
  filter_mode: heuristic
  skip_code_filter: false
  skip_quality_filter: false
  skip_ellipsis_filter: false
  append_eos_token: true
  token_dtype: uint16
  min_tokens: 8
  minimum_tokens_per_doc: 64
  context_length: 1024
  target_tokens: 300000000
  topic_classes:
    - World
    - Business
    - Sci/Tech
  topic_distribution: null
  skip_topic_filter: false
  tokenizer_name: null

logging:
  console_level: INFO
  file_level: DEBUG
