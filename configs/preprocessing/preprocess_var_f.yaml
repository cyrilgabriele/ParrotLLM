# Variant F: Loose-clean baseline
# Keeps the baseline corpus broad, but disables the heuristic quality filter
# to measure whether Phase 5 is helping or over-pruning useful web text.

preprocess:
  dataset_size: dummy
  lang: en
  data_dir: data
  num_workers: auto
  skip_dedup: false
  skip_decontam: false
  filter_mode: heuristic
  skip_code_filter: false
  skip_quality_filter: true
  skip_ellipsis_filter: false
  append_eos_token: true
  token_dtype: uint16
  min_tokens: 8
  minimum_tokens_per_doc: 64
  context_length: 1024
  target_tokens: 300000000
  topic_classes: null
  topic_distribution: null
  skip_topic_filter: true
  tokenizer_name: null

logging:
  console_level: INFO
  file_level: DEBUG
