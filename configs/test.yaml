# Quick test config — 20 steps, small eval

preprocess:
  dataset_size: small
  lang: en
  data_dir: data
  num_workers: auto
  skip_dedup: false
  skip_decontam: false
  filter_mode: heuristic
  skip_code_filter: false
  skip_quality_filter: false
  skip_ellipsis_filter: false
  tokenizer_name: openai-community/gpt2
  append_eos_token: false
  token_dtype: uint16
  min_tokens: 64
  context_length: 1024
  target_tokens: null
  topic_classes: null
  topic_distribution: null
  skip_topic_filter: false

model:
  vocab_size: 50258
  pad_token_id: 50257
  bos_token_id: 50256
  eos_token_id: 50256
  d_model: 320
  n_layers: 16
  n_heads: 8
  d_ff: 854
  context_length: 1024
  bias: false
  dropout: 0.0
  rope_theta: 10000.0

training:
  device: auto
  train_bin: data/processed/train.bin
  val_bin: data/processed/val.bin
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 6.0e-4
  min_lr: 6.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 5
  max_steps: 20
  lr_schedule: wsd
  lr_decay_ratio: 0.1
  z_loss_coeff: 1.0e-4
  save_every: 10
  eval_every: 10
  checkpoint_dir: checkpoints
  keep_last_checkpoints: 10
  keep_best_checkpoints: 10
  runs_dir: runs
  log_every: 5

logging:
  console_level: INFO
  file_level: DEBUG
  components:
    data_preprocessing: DEBUG
    model_initialization: INFO
    training: DEBUG
