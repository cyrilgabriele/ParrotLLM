# Optuna Hyperparameter Tuning Configuration
# Run with: python main.py --stage tune --config configs/tuning/model_achitecture/8_75mio_model_tuning.yaml
# Architecture search inside the ~8.5M–8.75M parameter window
# Local RTX 5090 laptop — tune architecture + optimizer on a compact proxy

# ── Proxy model — anchor point inside the target parameter window ────────────
model:
  vocab_size: 50258
  pad_token_id: 50257
  bos_token_id: 50256
  eos_token_id: 50256
  d_model: 120                    # anchor: 120 / 15 / 4 / 320 ≈ 8.63M params
  n_layers: 15                    # anchor depth; Optuna searches the ratio around this
  n_heads: 4                      # anchor head count (d_head = 30, even for RoPE)
  d_ff: 320                       # SwiGLU 8/3 × d_model (rounded to even)
  context_length: 256             # shorter ctx for speed (full model uses 1024)
  bias: false
  dropout: 0.0
  rope_theta: 10000.0

training:
  device: auto
  train_bin: data/experiment-a/train.bin
  val_bin: data/experiment-a/val.bin
  num_workers: 4
  batch_size: 32                  # fixed for this study
  gradient_accumulation_steps: 1  # fixed for this study
  learning_rate: 8.0e-4
  min_lr: 8.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 100
  compile: true                     # via WSL2 Ubuntu + Triton
  max_steps: 3000                   # proper proxy length for reliable HP signal
  lr_schedule: wsd
  lr_decay_ratio: 0.1
  z_loss_coeff: 1.0e-4
  save_every: 50000                 # disable periodic last-checkpoint saves during tuning
  eval_every: 750                   # eval 4 times per trial (750, 1500, 2250, end)
  checkpoint_dir: checkpoints/8_75mio_model_tuning
  keep_last_checkpoints: 10
  keep_best_checkpoints: 10
  runs_dir: runs/tuning/8_75mio_model_tuning
  log_every: 200

logging:
  console_level: INFO
  file_level: INFO
  components:
    data_preprocessing: WARNING
    model_initialization: INFO
    training: INFO

# ── Optuna study settings ─────────────────────────────────────────────────────
tune:
  name: parrotllm-8_75mio-architecture
  storage: optuna_studies/parrotllm-8_75mio-architecture.db
  n_trials: 80                    # 13 dims × ~6x coverage = still manageable locally
  timeout: null
  sampler: tpe
  pruner: hyperband
  param_budget_min: 8500000
  param_budget_max: 8750000
  pruner_kwargs:
    min_resource: 750               # match eval_every; Optuna only gets reports at eval steps
    max_resource: 3000
    reduction_factor: 3

  # ── Full search space ───────────────────────────────────────────────────────
  # 13 dimensions total:
  #   4 architecture dimensions sampled as valid presets inside the param budget
  #   9 optimizer / schedule / regularization dimensions
  search_space:
    # Architecture — Optuna expands these ranges into only valid presets that fall
    # inside the 8.5M–8.75M parameter window for the current transformer sketch.
    d_model:
      type: int
      low: 104
      high: 144
      step: 8
    n_layers:
      type: int
      low: 6
      high: 27
      step: 1
    n_heads:
      type: categorical
      choices: [2, 4, 6, 8, 12, 16]
    d_ff:
      type: int
      low: 272
      high: 384
      step: 16

    # Optimizer — core HPs (Chinchilla, LLaMA, MobileLLM all tune these)
    learning_rate:
      type: log_uniform
      low: 1.0e-4
      high: 3.0e-3
    weight_decay:
      type: log_uniform
      low: 0.01
      high: 0.3
    beta2:                          # Chinchilla uses 0.95, LLaMA 0.95, GPT-3 0.999
      type: uniform
      low: 0.93
      high: 0.999
    warmup_steps:
      type: int
      low: 50
      high: 500
      step: 50
    grad_clip:
      type: uniform
      low: 0.5
      high: 2.0

    # LR schedule — WSD (MiniCPM, arXiv:2404.06395) vs cosine (GPT-3 standard)
    lr_schedule:
      type: categorical
      choices: [wsd, cosine]
    lr_decay_ratio:                 # fraction of training spent in decay phase
      type: uniform
      low: 0.05
      high: 0.3

    # Regularization
    dropout:
      type: uniform
      low: 0.0
      high: 0.15
    z_loss_coeff:                   # PaLM (arXiv:2204.02311): stabilizes logits in mixed precision
      type: log_uniform
      low: 1.0e-5
      high: 1.0e-3
