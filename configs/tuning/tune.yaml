# Optuna Hyperparameter Tuning Configuration
# Run with: python main.py --stage tune --config configs/tune.yaml

# ── Proxy model (search space overrides these) ────────────────────────────────
model:
  vocab_size: 50258
  pad_token_id: 50257
  bos_token_id: 50256
  eos_token_id: 50256
  d_model: 256
  n_layers: 8
  n_heads: 4
  d_ff: 682
  context_length: 256
  bias: false
  dropout: 0.05
  rope_theta: 10000.0

training:
  device: auto
  train_bin: data/experiment-a/train.bin
  val_bin: data/experiment-a/val.bin
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 8.0e-4
  min_lr: 8.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 100
  max_steps: 10000
  lr_schedule: cosine
  lr_decay_ratio: 0.1
  z_loss_coeff: 1.0e-4
  save_every: 50000              # effectively disable checkpointing during tuning
  eval_every: 200
  checkpoint_dir: checkpoints
  runs_dir: runs/tuning
  log_every: 50

logging:
  console_level: WARNING         # quiet during tuning
  file_level: DEBUG
  components:
    data_preprocessing: DEBUG
    model_initialization: INFO
    training: WARNING

# ── Optuna study settings ─────────────────────────────────────────────────────
tune:
  name: parrotllm-hp-search
  storage: optuna_studies/parrotllm.db
  n_trials: 50
  timeout: null
  sampler: tpe
  pruner: hyperband
  pruner_kwargs:
    min_resource: 200
    max_resource: 10000
    reduction_factor: 3

  # Search space definition
  # Types: log_uniform, uniform, int, categorical
  search_space:
    # Optimizer
    learning_rate:
      type: log_uniform
      low: 1.0e-4
      high: 3.0e-3
    weight_decay:
      type: log_uniform
      low: 0.01
      high: 0.3
    beta1:
      type: uniform
      low: 0.85
      high: 0.95
    beta2:
      type: uniform
      low: 0.95
      high: 0.999
    warmup_steps:
      type: int
      low: 50
      high: 500
      step: 50
    grad_clip:
      type: uniform
      low: 0.5
      high: 2.0

    # Batching
    batch_size:
      type: categorical
      choices: [8, 16, 32, 64]
    gradient_accumulation_steps:
      type: categorical
      choices: [1, 2, 4]

    # Regularization
    dropout:
      type: uniform
      low: 0.0
      high: 0.15

    # Architecture
    d_model:
      type: categorical
      choices: [192, 256, 320, 384]
    n_layers:
      type: int
      low: 4
      high: 12
    n_heads:
      type: categorical
      choices: [4, 8]
